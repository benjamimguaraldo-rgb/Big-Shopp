<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Somos a BIG SHOPP, especializada em brindes corporativos personalizados, atendendo empresas que buscam fortalecer sua marca de forma criativa e eficiente. Desenvolvemos brindes para eventos, campanhas promocionais, ações institucionais, datas comemorativas e muito mais.">
    <link rel="apple-touch-icon" sizes="180x180" href="imagens/favicon.png">
    <link rel="icon" type="image/png" href="imagens/favicon.png">
    <link rel="icon" type="image/png" href="imagens/favicon.png">
    <link rel="icon" type="image/png" href="imagens/inox.png">
    <link rel="icon" type="image/png" href="imagens/logo.png">
    <link rel="stylesheet" href="style.css">
    <title>Big Shop Login</title>
</head>
<body class="home">
    <header class="headerprincipal">
        <img src="imagens/logo.png"
             alt="Logo Da Big Shop"
             width="64px"
             height="64px">
             <h2>Big Shop</h2>

          
            <a href="home.html">
               <button class="botao">🏠 Pagina Principal</button>
            </a>


            <a href="https://wa.me/5511922207487" target="_blank">
                <button class="botao">📞 WhatsApp</button>
            </a>

             <a href="produtos.html">
               <button class="botao">🛍️ Produtos</button>
             </a>
             <a href="carrinho.html">
                <button class="botao">🛒 Carrinho</button>
             </a>


             <a href="#">
                <button class="botao">📦 Meus Pedidos</button>
             </a>
    </header>

    <main class="conteudo">
        <div class="cadastro">
           <div class="campo-grupo">
             <label for="email">Digite Seu Email : </label>
             <input type="email" id="email" name="email" placeholder="example@email.com" required>
           </div>

           <div class="campo-grupo">
            <label for="token">Seu Token : </label>
            <input type="text" id="token" name="token" placeholder="seu token aqui" required>
           </div>
             
            <button class="botao3" id="logbutton">Logar</button>
           

        <p>não tem uma conta?</p>
        <a href="login.html">Criar uma Conta</a>
        </div>
    </main>



    <script>
    const logButton = document.getElementById('logbutton');

    logButton.addEventListener('click', async () => {
        const email = document.getElementById('email').value.trim();
        const token = document.getElementById('token').value.trim();

        // Validação simples
        if (!email || !token) {
            alert("❌ Por favor, preencha tanto o E-mail quanto o Token!");
            return;
        }

        try {
            const resposta = await fetch('https://big-shopp.onrender.com/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, token })
            });

            const dados = await resposta.json();

            if (dados.sucesso) {
                alert(dados.mensagem);
                // Redireciona para a página principal depois do login
                window.location.href = "home.html";
            } else {
                alert("❌ " + dados.mensagem);
            }
        } catch (err) {
            console.error("Erro:", err);
            alert("Não foi possível conectar ao servidor.\nVerifique se o Python está rodando na porta 5000.");
        }
    });
    </script>
</body>
</html>
