<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="mobile-automatico.css">
    <link rel="stylesheet" href="admin-entregas.css">
    <title>Big Shop - Admin de Entregas</title>
</head>
<body>
    <h1>📦 ADMIN - Gerenciar Entregas</h1>
    
    <div class="filtros">
    <button class="filtro-btn ativo" onclick="filtrarPedidos('todos', event)">Todos</button>
    <button class="filtro-btn" onclick="filtrarPedidos('pagamento_pendente', event)">⏳ Pendentes</button>
    <button class="filtro-btn" onclick="filtrarPedidos('pago', event)">💰 Pagos</button>
    <button class="filtro-btn" onclick="filtrarPedidos('enviado', event)">🚚 Enviados</button>
    <button class="filtro-btn" onclick="filtrarPedidos('entregue', event)">✅ Entregues</button>
    <button class="filtro-btn" onclick="filtrarPedidos('cancelado', event)">❌ Cancelados</button>
    </div>
    
    <div id="pedidos-container" class="pedidos-grid">
        <div class="carregando">
            <div class="loader"></div>
            <p>Carregando pedidos...</p>
        </div>
    </div>
    
    <!-- TELA DE BLOQUEIO -->
    <div id="telaBloqueio" class="tela-bloqueio" style="display: none;">
        <div class="bloqueio-conteudo">
            <h2>🔒 ÁREA RESTRITA</h2>
            <p>Digite a senha para acessar:</p>
            <input type="password" id="senhaInput" placeholder="Senha" class="senha-input">
            <button onclick="verificarSenha()" class="btn-senha">Acessar</button>
            <p id="mensagemErro" class="erro-senha"></p>
        </div>
    </div>
    <script src="config.js"></script>
    <script src="admin-entregas.js"></script>
    <script src="mobile-automatico.js"></script>
</body>
</html>
